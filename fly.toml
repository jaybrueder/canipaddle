app = 'canipaddle'
primary_region = 'fra'

[build]
  image = 'ghcr.io/jaybrueder/canipaddle:latest'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
